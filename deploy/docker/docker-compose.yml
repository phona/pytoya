version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pytoya-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-pytoya}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-pytoya}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pytoya-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/phona/pytoya/api:${IMAGE_TAG:-latest}
    container_name: pytoya-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-pytoya}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      SERVER_PORT: "3000"
    volumes:
      - api_uploads:/app/uploads
    ports:
      - "127.0.0.1:3000:3000"

  web:
    image: ghcr.io/phona/pytoya/web:${IMAGE_TAG:-latest}
    container_name: pytoya-web
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:3001:3000"

  worker:
    image: ghcr.io/phona/pytoya/api:${IMAGE_TAG:-latest}
    container_name: pytoya-worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-pytoya}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PYTOYA_WORKER_ENABLED: "true"
      SERVER_PORT: "3001"
    entrypoint: ["node", "dist/worker.js"]
    volumes:
      - api_uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
  api_uploads:

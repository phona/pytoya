services:
  postgres:
    image: postgres:15-alpine
    container_name: pytoya-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 
      POSTGRES_DB: pytoya
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - /root/pytoya/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres -d pytoya]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pytoya-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - /root/pytoya/data/redis:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    pull_policy: never
    image: ghcr.io/phona/pytoya/api:${IMAGE_TAG:-latest}
    container_name: pytoya-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 
      DB_NAME: pytoya
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 
      NODE_ENV: production
      SERVER_PORT: 3000
    volumes:
      - /root/pytoya/config.yaml:/app/config.yaml:ro
      - /root/pytoya/data/uploads:/app/uploads

  web:
    pull_policy: never
    image: ghcr.io/phona/pytoya/web:${IMAGE_TAG:-latest}
    container_name: pytoya-web
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - /root/pytoya/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 127.0.0.1:3001:3000

  worker:
    pull_policy: never
    image: ghcr.io/phona/pytoya/api:${IMAGE_TAG:-latest}
    container_name: pytoya-worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 
      DB_NAME: pytoya
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 
      NODE_ENV: production
      PYTOYA_WORKER_ENABLED: true
      SERVER_PORT: 3001
    entrypoint: [node, dist/worker.js]
    volumes:
      - /root/pytoya/config.yaml:/app/config.yaml:ro
      - /root/pytoya/data/uploads:/app/uploads
